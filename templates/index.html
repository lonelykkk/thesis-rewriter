{% extends "base.html" %}
{% block title %}首页 - 论文降重降AI助手{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div class="flex flex-col lg:flex-row gap-6">

        <!-- 左侧：历史记录（桌面） -->
        <div class="hidden lg:block w-56 xl:w-64 flex-shrink-0">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden sticky top-20">
                <div class="px-4 py-3 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                    <h2 class="text-sm font-semibold text-gray-700">历史记录</h2>
                    <span class="text-xs text-gray-400 bg-white px-2 py-0.5 rounded-full" id="historyCount">0</span>
                </div>
                <div id="historyList" class="divide-y divide-gray-50 max-h-[600px] overflow-y-auto">
                    <!-- 动态生成 -->
                    <div class="p-6 text-center text-sm text-gray-400">
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 居中：主输入区 -->
        <div class="flex-1 min-w-0 flex justify-center">
            <div class="w-full max-w-3xl">
                <!-- 标题 -->
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-gray-900">论文改写</h1>
                    <p class="text-sm text-gray-500 mt-1">填入论文内容，选择处理模式，一键完成降重/降AI</p>
                </div>

                <!-- 模式选择 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
                    <div class="bg-white rounded-xl p-3 shadow-sm border border-blue-100 hover:shadow-md transition-shadow">
                        <label class="flex items-start gap-3 cursor-pointer">
                            <input type="radio" name="mode" value="both" checked
                                   class="mt-1 w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <div class="flex-1">
                                <span class="block text-sm font-semibold text-gray-800">全面优化</span>
                                <span class="text-xs text-gray-400">降重 + 降AI同时进行</span>
                            </div>
                        </label>
                    </div>
                    <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                        <label class="flex items-start gap-3 cursor-pointer">
                            <input type="radio" name="mode" value="reduce"
                                   class="mt-1 w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <div class="flex-1">
                                <span class="block text-sm font-semibold text-gray-800">仅降重</span>
                                <span class="text-xs text-gray-400">替换同义词、变换句式</span>
                            </div>
                        </label>
                    </div>
                    <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                        <label class="flex items-start gap-3 cursor-pointer">
                            <input type="radio" name="mode" value="deai"
                                   class="mt-1 w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
                            <div class="flex-1">
                                <span class="block text-sm font-semibold text-gray-800">仅降AI</span>
                                <span class="text-xs text-gray-400">增加人性化表达</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 输入框 -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-4">
                    <div class="flex items-center justify-between px-4 py-2.5 bg-gray-50 border-b border-gray-100">
                        <span class="text-xs text-gray-400 font-medium">输入论文内容</span>
                        <span id="charCount" class="text-xs text-gray-400">0 / 50000 字</span>
                    </div>
                    <textarea id="inputText"
                              class="w-full p-4 text-sm text-gray-700 leading-relaxed resize-y min-h-[240px] focus:outline-none border-0"
                              placeholder="请粘贴或输入需要处理的论文内容...&#10;&#10;支持中文论文、摘要、引言、方法论等章节&#10;建议每次输入不低于20字，最长50000字"></textarea>
                </div>

                <!-- 操作按钮 -->
                <div class="flex flex-col sm:flex-row gap-3 mb-6">
                    <button id="rewriteBtn"
                            class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold rounded-xl hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-blue-200 btn-scale">
                        <span id="btnContent">
                            <svg class="w-5 h-5 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                            <span>开始处理</span>
                        </span>
                    </button>
                    <button id="clearBtn"
                            class="px-6 py-3 bg-white border border-gray-200 text-gray-600 font-medium rounded-xl hover:bg-gray-50 transition-colors btn-scale">
                        清空
                    </button>
                    <!-- 移动端历史按钮 -->
                    <button id="mobileHistoryBtn"
                            class="sm:hidden px-6 py-3 bg-white border border-gray-200 text-gray-600 font-medium rounded-xl hover:bg-gray-50 transition-colors btn-scale">
                        历史记录
                    </button>
                </div>

                <!-- 示例文本 -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <span class="text-xs text-gray-400 py-1">示例：</span>
                    <button class="example-btn text-xs px-3 py-1.5 bg-gray-100 text-gray-500 rounded-full hover:bg-blue-50 hover:text-blue-600 transition-colors"
                            data-example="abstract">摘要</button>
                    <button class="example-btn text-xs px-3 py-1.5 bg-gray-100 text-gray-500 rounded-full hover:bg-blue-50 hover:text-blue-600 transition-colors"
                            data-example="intro">引言</button>
                    <button class="example-btn text-xs px-3 py-1.5 bg-gray-100 text-gray-500 rounded-full hover:bg-blue-50 hover:text-blue-600 transition-colors"
                            data-example="method">方法论</button>
                    <button class="example-btn text-xs px-3 py-1.5 bg-gray-100 text-gray-500 rounded-full hover:bg-blue-50 hover:text-blue-600 transition-colors"
                            data-example="conclusion">结论</button>
                </div>
            </div>
        </div>

    <!-- 移动端历史弹窗 -->
    <div id="mobileHistoryPanel" class="sm:hidden fixed inset-0 z-50 hidden">
        <div id="mobileHistoryOverlay" class="absolute inset-0 bg-black/30"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl shadow-xl max-h-[70vh] overflow-hidden animate-slide-up">
            <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
                <h3 class="text-sm font-semibold text-gray-700">历史记录</h3>
                <button id="mobileHistoryClose" class="text-gray-400 hover:text-gray-600 p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="mobileHistoryList" class="divide-y divide-gray-50 overflow-y-auto max-h-[calc(70vh-52px)]">
                <div class="p-6 text-center text-sm text-gray-400"><p>加载中...</p></div>
            </div>
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-40 items-center justify-center">
        <div class="text-center">
            <div class="inline-flex gap-1.5 mb-4">
                <span class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay:0ms"></span>
                <span class="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style="animation-delay:150ms"></span>
                <span class="w-3 h-3 bg-blue-400 rounded-full animate-bounce" style="animation-delay:300ms"></span>
            </div>
            <p class="text-sm text-gray-500 font-medium">正在处理，请稍候...</p>
            <p class="text-xs text-gray-400 mt-1">根据文本长度不同，处理时间可能有所不同</p>
        </div>
    </div>
</div>
{% endblock %}
