{% extends "base.html" %}
{% block title %}登录 - 论文降重降AI助手{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
            <!-- 标题 -->
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900">欢迎回来</h1>
                <p class="text-gray-500 text-sm mt-2">登录后继续使用论文降重降AI服务</p>
            </div>

            <!-- Flash 消息 -->
            {% with msgs = get_flashed_messages(with_categories=true) %}
            {% if msgs %}
            {% for cat, msg in msgs %}
            <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium
                {% if cat == 'success' %}bg-green-50 text-green-700 border border-green-200
                {% elif cat == 'warning' %}bg-yellow-50 text-yellow-700 border border-yellow-200
                {% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
                {{ msg }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- 表单 -->
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-700 placeholder-gray-400"
                           placeholder="请输入用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-700 placeholder-gray-400"
                           placeholder="请输入密码">
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-medium rounded-xl hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all shadow-lg shadow-blue-200">
                    登 录
                </button>
            </form>

            <!-- 注册链接 -->
            <p class="text-center text-sm text-gray-500 mt-6">
                还没有账号？
                <a href="{{ url_for('register') }}" class="text-blue-600 hover:text-blue-700 font-medium">
                    立即注册
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
